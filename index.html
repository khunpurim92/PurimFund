<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FundPlan">
<meta name="theme-color" content="#0F0F14">
<title>FundPlan — ผู้ช่วยลงทุนกองทุน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
:root{
  --bg:#0F0F14; --bg2:#18181F; --bg3:#1F1F28;
  --card:#1C1C25; --card2:#222230; --border:#2A2A38;
  --text:#F0F0F5; --text2:#9090A8; --text3:#55556A;
  --accent:#7C6FF7; --accent2:#A89FF9;
  --accent-bg:rgba(124,111,247,0.12); --accent-glow:rgba(124,111,247,0.25);
  --green:#34D399; --green-bg:rgba(52,211,153,0.1);
  --amber:#FBBF24; --amber-bg:rgba(251,191,36,0.1);
  --red:#F87171; --red-bg:rgba(248,113,113,0.1);
  --teal:#22D3EE; --teal-bg:rgba(34,211,238,0.1);
  --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:24px;
}
body{font-family:'Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;}
.scroll{flex:1;overflow-y:auto;padding:14px 14px 100px;}
::-webkit-scrollbar{display:none;}
.num{font-variant-numeric:tabular-nums;}

/* ── top bar ── */
.topbar{
  position:sticky;top:0;z-index:20;
  background:rgba(15,15,20,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:calc(14px + env(safe-area-inset-top)) 16px 14px;
  display:flex;align-items:center;gap:10px;
}
.topbar .tt{font-size:18px;font-weight:800;color:var(--text);}
.topbar .ts{font-size:11px;color:var(--text2);margin-top:1px;}
.topbar .spacer{flex:1;}
.iconbtn{
  width:38px;height:38px;border-radius:11px;border:1px solid var(--border);
  background:var(--card);color:var(--accent2);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.iconbtn:active{background:var(--card2);}

/* ── cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;}
.card-glow{box-shadow:0 0 0 1px var(--accent-glow),0 8px 32px rgba(0,0,0,.35);}
.lbl{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.sec-ttl{font-size:13px;font-weight:800;color:var(--text);margin:18px 2px 10px;display:flex;align-items:center;gap:7px;}
.sec-ttl .more{margin-left:auto;font-size:11px;color:var(--accent2);font-weight:700;cursor:pointer;}

/* ── big value ── */
.bigval{font-size:32px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.pl-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;}
.pl-up{background:var(--green-bg);color:var(--green);}
.pl-down{background:var(--red-bg);color:var(--red);}

/* ── stat boxes ── */
.statrow{display:flex;gap:8px;flex-wrap:wrap;}
.stat{flex:1;min-width:90px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;text-align:center;}
.stat.hl{background:var(--accent-bg);border-color:rgba(124,111,247,.3);}
.stat .sl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.stat .sv{font-size:19px;font-weight:800;color:var(--text);margin:3px 0 1px;}
.stat.hl .sv{color:var(--accent2);}
.stat .su{font-size:10px;color:var(--text3);}

/* ── allocation bars ── */
.allocrow{margin-bottom:11px;}
.allocrow:last-child{margin-bottom:0;}
.alloctop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.allocname{font-size:13px;color:var(--text);font-weight:500;}
.allocpct{font-size:12px;color:var(--text2);font-weight:700;}
.bartrack{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.barfill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.barwrap2{position:relative;height:7px;background:var(--bg3);border-radius:4px;margin-top:5px;}
.targetmark{position:absolute;top:-3px;width:2px;height:13px;background:var(--text2);border-radius:1px;}

/* ── holding row ── */
.holding{display:flex;align-items:center;gap:11px;padding:12px 0;border-top:1px solid var(--border);cursor:pointer;}
.holding:first-of-type{border-top:none;}
.fund-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.holding .hn{font-size:14px;font-weight:700;color:var(--text);}
.holding .hsub{font-size:11px;color:var(--text3);margin-top:1px;}
.holding .hval{font-size:14px;font-weight:800;color:var(--text);text-align:right;}
.holding .hpl{font-size:11px;font-weight:700;text-align:right;margin-top:1px;}

/* ── alert row ── */
.alertrow{display:flex;gap:11px;align-items:flex-start;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:9px;}
.alertdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.alertrow .at{font-size:13px;font-weight:700;color:var(--text);}
.alertrow .as{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.5;}

/* ── forms ── */
.field{flex:1;}
.flbl{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;letter-spacing:.3px;}
input,select,textarea{
  width:100%;padding:12px 13px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r-sm);font-size:14px;font-family:inherit;outline:none;color:var(--text);
  -webkit-appearance:none;appearance:none;transition:border-color .2s;
}
textarea{resize:none;line-height:1.5;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
input::placeholder,textarea::placeholder{color:var(--text3);}
.row{display:flex;gap:8px;}

/* ── segments ── */
.seg{display:flex;gap:4px;background:var(--bg3);padding:3px;border-radius:var(--r-sm);border:1px solid var(--border);}
.seg button{flex:1;padding:9px 4px;border:none;border-radius:9px;background:none;color:var(--text3);font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
.seg button.on{background:var(--accent);color:#fff;font-weight:800;box-shadow:0 2px 8px var(--accent-glow);}

/* ── buttons ── */
.btn{border:none;border-radius:var(--r-sm);padding:11px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px var(--accent-glow);}
.btn-primary:active{transform:scale(.97);}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:active{background:var(--card2);}
.btn-save{width:100%;background:linear-gradient(135deg,var(--accent),#9B8FF9);color:#fff;border:none;border-radius:var(--r-md);padding:15px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;margin-top:6px;box-shadow:0 4px 20px var(--accent-glow);transition:all .2s;}
.btn-save:active{transform:scale(.98);}
.btn-mini{background:var(--accent-bg);border:1px solid rgba(124,111,247,.25);color:var(--accent2);font-size:11px;font-weight:700;padding:6px 13px;border-radius:20px;cursor:pointer;}

/* ── pills / tags ── */
.tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:7px;}
.tag-low{background:var(--green-bg);color:var(--green);}
.tag-mid{background:var(--amber-bg);color:var(--amber);}
.tag-high{background:var(--red-bg);color:var(--red);}
.tag-accent{background:var(--accent-bg);color:var(--accent2);}
.tag-teal{background:var(--teal-bg);color:var(--teal);}

/* ── risk dots ── */
.riskdots{display:flex;gap:4px;}
.rdot{width:8px;height:8px;border-radius:50%;background:var(--border);}
.rdot.on{background:var(--accent);}

/* ── AI box ── */
.aibox{background:var(--accent-bg);border:1px solid rgba(124,111,247,.25);border-radius:var(--r-md);padding:12px 14px;margin-top:10px;}
.aibox .ail{font-size:10px;color:var(--accent2);font-weight:800;letter-spacing:.5px;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.aibox .aitext{font-size:12.5px;color:var(--text);line-height:1.6;}

/* ── bottom nav ── */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(15,15,20,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:30;
}
.nav button{flex:1;background:none;border:none;color:var(--text3);font-family:inherit;cursor:pointer;padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
.nav button.on{color:var(--accent2);}
.nav .ni{font-size:20px;line-height:1;}
.nav .nl{font-size:10px;font-weight:700;}

/* ── empty ── */
.empty-box{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-box .ei{font-size:42px;margin-bottom:10px;opacity:.6;}
.empty-box .et{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:4px;}
.empty-box .es{font-size:12px;color:var(--text3);line-height:1.5;}

/* ── overlay sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.sheet{width:100%;max-width:430px;background:var(--bg2);border-radius:var(--r-xl) var(--r-xl) 0 0;border:1px solid var(--border);border-bottom:none;padding:20px 16px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.16,1,.3,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.sheet-ttl{font-size:17px;font-weight:800;margin-bottom:14px;}

/* ── chat ── */
.chatwrap{display:flex;flex-direction:column;height:100%;}
.chatbody{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
.msg{display:flex;gap:9px;max-width:88%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg .avatar{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg.ai .avatar{background:var(--accent-bg);}
.msg.user .avatar{background:var(--card2);}
.bubble{padding:11px 13px;border-radius:14px;font-size:13.5px;line-height:1.65;}
.msg.ai .bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:5px;}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:5px;}
.chatinput{padding:10px 12px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;align-items:flex-end;}
.chatinput textarea{flex:1;max-height:100px;}
.sendbtn{width:42px;height:44px;border-radius:var(--r-sm);background:var(--accent);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;box-shadow:0 4px 14px var(--accent-glow);}
.sendbtn:disabled{opacity:.4;}
.dots{display:flex;gap:4px;padding:14px 13px;}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:bounce 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}
.quickchips{display:flex;gap:7px;flex-wrap:wrap;padding:0 14px 10px;}
.quickchip{background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;padding:7px 12px;border-radius:20px;cursor:pointer;font-family:inherit;}

/* ── progress (goals) ── */
.goalcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px;margin-bottom:11px;}
.goalhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.goalname{font-size:15px;font-weight:800;}
.goalmeta{font-size:11px;color:var(--text2);margin-top:2px;}

/* ── setup ── */
.setup{padding:40px 20px;}
.setup-head{text-align:center;margin-bottom:28px;}
.setup-logo{font-size:52px;margin-bottom:14px;}
.setup-ttl{font-size:26px;font-weight:900;letter-spacing:-.5px;}
.setup-sub{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6;max-width:300px;margin-left:auto;margin-right:auto;}

.err{font-size:12px;color:var(--red);font-weight:600;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;padding:11px 20px;border-radius:14px;opacity:0;pointer-events:none;transition:all .3s;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.divider{height:1px;background:var(--border);margin:14px 0;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════
   FundPlan — ผู้ช่วยวางแผนลงทุนกองทุน
   single-file web app · Claude API · localStorage
═══════════════════════════════════════════ */

const MODEL="claude-sonnet-4-6";

/* ── storage ── */
const LS={
  get(k,fb){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):fb;}catch{return fb;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.error(e);}},
  del(k){localStorage.removeItem(k);}
};
const K={
  key:"fp_key", profile:"fp_profile", holdings:"fp_holdings",
  funds:"fp_funds", goals:"fp_goals", dca:"fp_dca", tax:"fp_tax",
  alertcfg:"fp_alertcfg", dismissed:"fp_dismissed"
};

/* ── number / date utils ── */
const baht=n=>"฿"+Math.round(n).toLocaleString("th-TH");
const baht2=n=>"฿"+(Math.round(n*100)/100).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>(n>=0?"+":"")+(Math.round(n*100)/100)+"%";
const todayStr=()=>new Date().toLocaleDateString("sv-SE");
const THMONTH=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
function fmtDate(s){const d=new Date(s+"T00:00:00");return `${d.getDate()} ${THMONTH[d.getMonth()]} ${(d.getFullYear()+543)%100}`;}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* ── asset class meta ── */
const ASSET={
  th_equity:{label:"หุ้นไทย",color:"#7C6FF7"},
  global_equity:{label:"หุ้นต่างประเทศ",color:"#22D3EE"},
  bond:{label:"ตราสารหนี้",color:"#34D399"},
  mixed:{label:"กองทุนผสม",color:"#FBBF24"},
  property:{label:"อสังหา/REIT",color:"#F87171"},
  commodity:{label:"ทองคำ/สินค้าโภคภัณฑ์",color:"#F59E0B"},
  moneymarket:{label:"ตลาดเงิน",color:"#9090A8"}
};
const assetLabel=k=>ASSET[k]?.label||k;
const assetColor=k=>ASSET[k]?.color||"#9090A8";
const RISKLABEL=["","ต่ำมาก","ต่ำ","ปานกลางค่อนข้างต่ำ","ปานกลาง","ปานกลางค่อนข้างสูง","สูง","สูงมาก","สูงมาก","สูงมาก"];
function riskTag(r){const cls=r<=3?"tag-low":r<=5?"tag-mid":"tag-high";return `<span class="tag ${cls}">เสี่ยง ${r} · ${RISKLABEL[r]||""}</span>`;}

/* ── seed fund database (ข้อมูลตัวอย่างกองทุนไทย — ผู้ใช้แก้ NAV ได้, จริงควรดึงจาก API กลต.) ── */
const SEED_FUNDS=[
  {code:"KFSDIV",name:"กรุงศรีหุ้นปันผล",amc:"กรุงศรี",asset:"th_equity",risk:6,nav:24.18,fee:0.65,r1m:2.4,rytd:8.2,r1y:12.4,r3y:9.8,r5y:8.1,taxType:null},
  {code:"SCBSET50",name:"ไทยพาณิชย์ SET50 Index",amc:"ไทยพาณิชย์",asset:"th_equity",risk:6,nav:18.92,fee:0.55,r1m:1.8,rytd:6.5,r1y:10.1,r3y:7.2,r5y:6.8,taxType:null},
  {code:"K-USA",name:"กสิกร หุ้นสหรัฐ",amc:"กสิกร",asset:"global_equity",risk:6,nav:32.45,fee:1.20,r1m:3.1,rytd:14.2,r1y:21.5,r3y:13.4,r5y:14.1,taxType:null},
  {code:"KFGBRAND",name:"กรุงศรี Global Brands",amc:"กรุงศรี",asset:"global_equity",risk:6,nav:21.08,fee:1.55,r1m:2.2,rytd:11.8,r1y:17.2,r3y:10.9,r5y:11.5,taxType:null},
  {code:"TMBUSB",name:"ทหารไทย ธนบดี ตราสารหนี้",amc:"อีสท์สปริง",asset:"bond",risk:4,nav:12.84,fee:0.32,r1m:0.3,rytd:1.9,r1y:3.8,r3y:2.4,r5y:2.6,taxType:null},
  {code:"K-FIXED",name:"กสิกร ตราสารหนี้",amc:"กสิกร",asset:"bond",risk:3,nav:11.42,fee:0.28,r1m:0.2,rytd:1.6,r1y:3.2,r3y:2.1,r5y:2.3,taxType:null},
  {code:"SCBGOLD",name:"ไทยพาณิชย์ ทองคำ",amc:"ไทยพาณิชย์",asset:"commodity",risk:8,nav:16.71,fee:0.85,r1m:-1.2,rytd:9.4,r1y:6.1,r3y:11.2,r5y:8.9,taxType:null},
  {code:"K-PROP",name:"กสิกร พร็อพเพอร์ตี้",amc:"กสิกร",asset:"property",risk:7,nav:9.86,fee:0.95,r1m:0.8,rytd:4.2,r1y:5.5,r3y:1.8,r5y:3.1,taxType:null},
  {code:"KFSEQ-SSF",name:"กรุงศรีหุ้นระยะยาว SSF",amc:"กรุงศรี",asset:"th_equity",risk:6,nav:14.52,fee:0.70,r1m:2.1,rytd:7.8,r1y:11.5,r3y:8.9,r5y:7.6,taxType:"SSF"},
  {code:"K-USA-RMF",name:"กสิกร หุ้นสหรัฐ RMF",amc:"กสิกร",asset:"global_equity",risk:6,nav:19.34,fee:1.25,r1m:3.0,rytd:13.9,r1y:20.8,r3y:12.8,r5y:13.5,taxType:"RMF"},
  {code:"KKP-GB-THAIESG",name:"เกียรตินาคิน หุ้นยั่งยืน ThaiESG",amc:"เกียรตินาคิน",asset:"th_equity",risk:6,nav:10.88,fee:0.75,r1m:1.5,rytd:5.2,r1y:8.4,r3y:null,r5y:null,taxType:"THAIESG"},
  {code:"SCBRMF-BOND",name:"ไทยพาณิชย์ ตราสารหนี้ RMF",amc:"ไทยพาณิชย์",asset:"bond",risk:4,nav:13.21,fee:0.40,r1m:0.3,rytd:1.8,r1y:3.5,r3y:2.3,r5y:2.5,taxType:"RMF"}
];
function getFunds(){let f=LS.get(K.funds,null);if(!f){LS.set(K.funds,SEED_FUNDS);f=SEED_FUNDS;}return f;}

function getKey(){return LS.get(K.key,"")||"";}
async function callClaude({system,messages,max_tokens=1400}){
  const key=getKey();
  if(!key)throw new Error("NO_KEY");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:MODEL,max_tokens,...(system?{system}:{}),messages})
  });
  if(!res.ok){const t=await res.text();throw new Error(res.status+":"+t.slice(0,120));}
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}
function extractJSON(txt){
  const fence=txt.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(fence)txt=fence[1];
  txt=txt.trim();
  const start=txt.search(/[{\[]/);
  if(start>0)txt=txt.slice(start);
  let depth=0,end=0,inStr=false,esc=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(esc){esc=false;continue;}
    if(c==="\\"&&inStr){esc=true;continue;}
    if(c==='"')inStr=!inStr;
    if(!inStr){if(c==="{"||c==="[")depth++;if(c==="}"||c==="]"){depth--;if(depth===0){end=i+1;break;}}}
  }
  if(end>0)txt=txt.slice(0,end);
  return JSON.parse(txt);
}
function aiError(e){
  const m=String(e.message||e);
  if(m.includes("NO_KEY"))return"⚠️ ยังไม่ได้ใส่ API key (ไปที่แท็บ เพิ่มเติม → 🔑 API Key)";
  if(m.includes("401"))return"⚠️ API key ไม่ถูกต้อง";
  if(m.includes("429"))return"⚠️ เครดิตหมด หรือถึง rate limit";
  if(m.includes("400"))return"⚠️ คำขอผิดพลาด ลองใหม่";
  return"⚠️ เกิดข้อผิดพลาด: "+m.slice(0,80);
}

/* holding = {id, code, units, avgCost} → ดึง nav ปัจจุบันจาก fund DB */
function getHoldings(){return LS.get(K.holdings,[]);}
function computePortfolio(){
  const hs=getHoldings();
  let items=hs.map(h=>{
    const f=getFund(h.code)||{};
    const nav=f.nav||0;
    const cost=h.units*h.avgCost;
    const value=h.units*nav;
    const pl=value-cost;
    const plPct=cost>0?(pl/cost)*100:0;
    return {...h,fund:f,nav,cost,value,pl,plPct,asset:f.asset||"moneymarket"};
  });
  const totalValue=items.reduce((s,i)=>s+i.value,0);
  const totalCost=items.reduce((s,i)=>s+i.cost,0);
  const totalPL=totalValue-totalCost;
  const totalPLPct=totalCost>0?(totalPL/totalCost)*100:0;
  // allocation by asset class
  const allocMap={};
  items.forEach(i=>{allocMap[i.asset]=(allocMap[i.asset]||0)+i.value;});
  const alloc=Object.keys(allocMap).map(k=>({asset:k,value:allocMap[k],pct:totalValue>0?(allocMap[k]/totalValue)*100:0})).sort((a,b)=>b.value-a.value);
  return {items,totalValue,totalCost,totalPL,totalPLPct,alloc};
}

/* ── target allocation จาก risk profile ── */
const ALLOC_MODELS={
  conservative:{th_equity:15,global_equity:10,bond:55,moneymarket:20},
  moderate:{th_equity:25,global_equity:20,bond:35,commodity:5,moneymarket:15},
  balanced:{th_equity:30,global_equity:25,bond:30,commodity:5,property:5,moneymarket:5},
  aggressive:{th_equity:35,global_equity:35,bond:15,commodity:5,property:10}
};
const MODEL_LABEL={conservative:"ระมัดระวัง",moderate:"ปานกลาง",balanced:"สมดุล",aggressive:"เชิงรุก"};
function targetAlloc(){const p=LS.get(K.profile,{});return ALLOC_MODELS[p.model||"moderate"];}

/* ── rebalance: หา drift จาก target ── */
function computeDrift(){
  const port=computePortfolio();
  const target=targetAlloc();
  if(port.totalValue<=0)return [];
  const currentMap={};port.alloc.forEach(a=>currentMap[a.asset]=a.pct);
  const keys=new Set([...Object.keys(target),...Object.keys(currentMap)]);
  const drifts=[];
  keys.forEach(k=>{
    const cur=currentMap[k]||0,tgt=target[k]||0,diff=cur-tgt;
    drifts.push({asset:k,current:cur,target:tgt,diff});
  });
  return drifts.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
}
const DRIFT_THRESHOLD=5; // ±5%

function buildAlerts(port,bigDrifts){
  const alerts=[];
  const dismissed=LS.get(K.dismissed,[]);
  // rebalance drift
  bigDrifts.forEach(d=>{
    const id="drift_"+d.asset;
    if(dismissed.includes(id))return;
    if(d.diff>0)alerts.push({color:"var(--amber)",title:`${assetLabel(d.asset)} เกินเป้า ${Math.round(d.diff)}%`,sub:`ถืออยู่ ${Math.round(d.current)}% เป้าหมาย ${d.target}% — ควรพิจารณาลดสัดส่วน`});
    else alerts.push({color:"var(--teal)",title:`${assetLabel(d.asset)} ต่ำกว่าเป้า ${Math.round(-d.diff)}%`,sub:`ถืออยู่ ${Math.round(d.current)}% เป้าหมาย ${d.target}% — ควรพิจารณาเพิ่มสัดส่วน`});
  });
  // big losers
  const cfg=LS.get(K.alertcfg,{navDrop:10});
  port.items.forEach(i=>{
    if(i.plPct<=-cfg.navDrop){
      alerts.push({color:"var(--red)",title:`${i.code} ขาดทุน ${Math.round(-i.plPct)}%`,sub:`ต่ำกว่าระดับเตือนที่ตั้งไว้ (${cfg.navDrop}%) — ลองให้ AI ช่วยวิเคราะห์`});
    }
  });
  return alerts;
}

  s+=`[พอร์ตปัจจุบัน] มูลค่ารวม ${baht(port.totalValue)} | ต้นทุน ${baht(port.totalCost)} | กำไร/ขาดทุน ${port.totalPL>=0?"+":""}${baht(port.totalPL)} (${pct(port.totalPLPct)})\n`;
  s+="กองทุนที่ถือ:\n";
  port.items.forEach(i=>{s+=`- ${i.code} (${i.fund.name||""}, ${assetLabel(i.asset)}, เสี่ยง ${i.fund.risk||"?"}): ${i.units} หน่วย, NAV ${baht2(i.nav)}, มูลค่า ${baht(i.value)}, ${pct(i.plPct)}, ผลตอบแทน 1ปี ${i.fund.r1y!=null?i.fund.r1y+"%":"-"}\n`;});
  s+="\nสัดส่วนปัจจุบันเทียบเป้า:\n";
  computeDrift().forEach(d=>{s+=`- ${assetLabel(d.asset)}: ปัจจุบัน ${Math.round(d.current)}% เป้า ${d.target}% (${d.diff>0?"เกิน":"ขาด"} ${Math.abs(Math.round(d.diff))}%)\n`;});
  return s;
}

function renderChat(){

  }

      <div class="avatar">${m.role==="ai"?"🤖":"🙂"}</div>

function bindAI(){
  const inp=document.getElementById("chat-input");
  const btn=document.getElementById("chat-send");
  if(inp){
    inp.oninput=()=>{inp.style.height="auto";inp.style.height=Math.min(inp.scrollHeight,100)+"px";};
    inp.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();chatSend(inp.value);}};
  }
  if(btn)btn.onclick=()=>chatSend(inp.value);
  const body=document.getElementById("chatbody");if(body)body.scrollTop=body.scrollHeight;

async function chatSend(text){
  text=(text||"").trim();if(!text)return;
  if(!getKey()){chatMsgs.push({role:"user",text});chatMsgs.push({role:"ai",text:aiError(new Error("NO_KEY"))});render();return;}
  chatMsgs.push({role:"user",text});
  chatMsgs.push({role:"ai",text:null});
  if(state.tab!=="ai")go("ai"); else render();
  const body=document.getElementById("chatbody");if(body)body.scrollTop=body.scrollHeight;
  const sys=`คุณคือที่ปรึกษาการลงทุนกองทุนรวมไทยที่เป็นกลางและให้ข้อมูลรอบด้าน พูดภาษาไทยเป็นกันเองแต่แม่นยำ เข้าใจง่าย ไม่ใช้ศัพท์เทคนิคมากเกินจำเป็น

หลักการ:
- ใช้ข้อมูลพอร์ตจริงด้านล่างในการวิเคราะห์ อ้างอิงตัวเลขจริง ห้ามเดาตัวเลขที่ไม่มี
- ให้ข้อมูลและมุมมองเพื่อช่วยผู้ใช้ตัดสินใจเอง ไม่ฟันธงสั่งให้ซื้อ/ขาย
- เตือนเรื่องความเสี่ยงเมื่อเหมาะสม แต่ไม่ต้องเตือนซ้ำทุกข้อความ
- ตอบกระชับ ตรงประเด็น ใช้ตัวเลขและเหตุผลประกอบ
- ถ้าผู้ใช้ถามเรื่องที่ต้องใช้ข้อมูลล่าสุดที่คุณไม่มี (เช่นข่าวตลาดวันนี้) ให้บอกตามตรง

${portfolioContext()}`;
  try{
    chatHistory.push({role:"user",content:text});
    const reply=await callClaude({max_tokens:1200,system:sys,messages:chatHistory.slice(-10)});
    chatHistory.push({role:"assistant",content:reply});
    chatMsgs[chatMsgs.length-1]={role:"ai",text:reply};
  }catch(e){chatMsgs[chatMsgs.length-1]={role:"ai",text:aiError(e)};}
  render();
  const b2=document.getElementById("chatbody");if(b2)b2.scrollTop=b2.scrollHeight;
}

function renderGoal(g){
  const pct=Math.min(100,(g.current/g.target)*100);
  const monthsLeft=g.years*12;
  const remaining=g.target-g.current;
  const onTrack=remaining<=0||(g.monthly&&g.monthly*monthsLeft>=remaining*0.95);
  return `<div class="goalcard">
    <div class="goalhead">
      <div><div class="goalname">${esc(g.name)}</div><div class="goalmeta">${baht(g.current)} / ${baht(g.target)} · เหลือ ${g.years} ปี</div></div>
      <span class="tag ${onTrack?"tag-low":"tag-mid"}">${onTrack?"ตรงแผน":"ต้องเพิ่ม"}</span>
    </div>
    <div class="bartrack"><div class="barfill" style="width:${pct}%;background:${onTrack?"var(--green)":"var(--amber)"}"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--text2)"><span>${Math.round(pct)}%</span>${g.monthly?`<span>ออมเดือนละ ${baht(g.monthly)}</span>`:""}</div>
    <div style="display:flex;gap:7px;margin-top:11px">
      <button class="btn-mini" onclick="calcGoal('${g.id}')">🤖 AI คำนวณแผน</button>
      <button class="btn-mini" style="background:var(--bg3);color:var(--text2);border-color:var(--border)" onclick="editGoal('${g.id}')">แก้ไข</button>
    </div>
    <div id="goal-ai-${g.id}"></div>
  </div>`;
}

  const g=presetId?LS.get(K.goals,[]).find(x=>x.id===presetId):null;
  showSheet(`
    <div class="sheet-ttl">${g?"แก้ไขเป้าหมาย":"ตั้งเป้าหมายการออม"}</div>
    <div style="margin-bottom:12px"><div class="flbl">ชื่อเป้าหมาย</div><input id="g-name" value="${g?esc(g.name):""}" placeholder="เช่น เกษียณ, ดาวน์บ้าน, ทุนลูก"></div>
    <div class="row" style="margin-bottom:12px">
      <div class="field"><div class="flbl">เงินเป้าหมาย (บาท)</div><input id="g-target" type="number" inputmode="decimal" value="${g?g.target:""}" placeholder="3000000"></div>
      <div class="field"><div class="flbl">มีอยู่แล้ว (บาท)</div><input id="g-current" type="number" inputmode="decimal" value="${g?g.current:""}" placeholder="0"></div>
    </div>
    <div style="margin-bottom:14px"><div class="flbl">ระยะเวลา (ปี)</div><input id="g-years" type="number" inputmode="decimal" value="${g?g.years:""}" placeholder="10"></div>
    <div class="err" id="g-err" style="margin-bottom:10px"></div>
    <button class="btn-save" id="g-save">${g?"บันทึก":"เพิ่มเป้าหมาย"}</button>
    ${g?`<button class="btn btn-ghost" style="width:100%;margin-top:8px;color:var(--red)" onclick="delGoal('${g.id}')">🗑️ ลบเป้าหมาย</button>`:""}
  `);
  document.getElementById("g-save").onclick=()=>{

function editGoal(id){showAddGoal(id);}
function delGoal(id){if(!confirm("ลบเป้าหมายนี้?"))return;LS.set(K.goals,LS.get(K.goals,[]).filter(x=>x.id!==id));closeSheet();render();}
async function calcGoal(id){
  const out=document.getElementById("goal-ai-"+id);
  const g=LS.get(K.goals,[]).find(x=>x.id===id);if(!g)return;
  if(!getKey()){out.innerHTML=`<div class="aibox"><div class="aitext">${aiError(new Error("NO_KEY"))}</div></div>`;return;}
  out.innerHTML=`<div class="aibox"><div class="ail">🤖 กำลังคำนวณ...</div><div class="dots" style="padding:4px 0"><span></span><span></span><span></span></div></div>`;
  const p=LS.get(K.profile,{});
  try{
    const txt=await callClaude({max_tokens:700,system:`คุณคือนักวางแผนการเงินไทย คำนวณแผนการออมเพื่อเป้าหมาย โดยสมมติผลตอบแทนเฉลี่ยที่เหมาะกับความเสี่ยงของผู้ใช้ (ระมัดระวัง ~3%, ปานกลาง ~5%, สมดุล ~6%, เชิงรุก ~8% ต่อปี) อธิบายภาษาไทยเข้าใจง่าย ระบุตัวเลขชัดเจน เตือนว่าเป็นการประมาณการ

ในตอนท้ายให้แนบ block (ผู้ใช้จะเห็นเป็นจำนวนเงินที่ต้องออม): <SAVE>{"monthly":ตัวเลขบาทต่อเดือน}</SAVE>`,
    messages:[{role:"user",content:`เป้าหมาย: ${g.name}\nต้องการ ${baht(g.target)} ภายใน ${g.years} ปี\nมีอยู่แล้ว ${baht(g.current)}\nโปรไฟล์ความเสี่ยง: ${MODEL_LABEL[p.model]}\n\nต้องออมเดือนละเท่าไร? อธิบายสั้นๆ`}]});
    let clean=txt,monthly=null;
    const m=txt.match(/<SAVE>([\s\S]*?)<\/SAVE>/);
    if(m){clean=clean.replace(/<SAVE>[\s\S]*?<\/SAVE>/,"").trim();try{const j=extractJSON(m[1]);if(j&&typeof j.monthly==="number")monthly=Math.round(j.monthly);}catch{}}
    if(monthly){LS.set(K.goals,LS.get(K.goals,[]).map(x=>x.id===id?{...x,monthly}:x));}
    out.innerHTML=`<div class="aibox"><div class="ail">🤖 แผนการออม</div><div class="aitext">${esc(clean).replace(/\n/g,"<br>")}</div></div>`;
    if(monthly)setTimeout(()=>render(),1800);
  }catch(e){out.innerHTML=`<div class="aibox"><div class="aitext">${aiError(e)}</div></div>`;}
}

function redoProfile(){if(!confirm("ทำแบบประเมินความเสี่ยงใหม่?"))return;LS.del(K.profile);setupAnswers=[];render();}
function resetAll(){
  if(!confirm("ล้างข้อมูลทั้งหมด? พอร์ต เป้าหมาย และการตั้งค่าจะหายทั้งหมด (ยกเว้น API key)"))return;
  [K.profile,K.holdings,K.funds,K.goals,K.dca,K.tax,K.alertcfg,K.dismissed].forEach(k=>LS.del(k));
  state={tab:"home",fundFilter:"all"};chatHistory=[];chatMsgs=[];
  render();toast("ล้างข้อมูลแล้ว");
}

/* ── render root ── */
function render(){
  const app=document.getElementById("app");
  const p=LS.get(K.profile,null);
  if(!p){app.innerHTML=viewSetup();bindSetup();return;}
  app.innerHTML=`
    ${topbar()}
    <div class="scroll" id="scroll">${viewFor(state.tab)}</div>
    ${navbar()}
  `;
  bindFor(state.tab);
}
function go(tab){state.tab=tab;render();const s=document.getElementById("scroll");if(s)s.scrollTop=0;}

/* ── utils: sheet / toast ── */
function showSheet(html){
  closeSheet();
  const o=document.createElement("div");o.className="overlay";o.id="overlay";
  o.innerHTML=`<div class="sheet" id="sheet"><div class="sheet-handle"></div>${html}</div>`;
  o.onclick=e=>{if(e.target===o)closeSheet();};
  document.body.appendChild(o);
}
function closeSheet(){const o=document.getElementById("overlay");if(o)o.remove();}
function setErr(id,msg){const e=document.getElementById(id);if(e)e.textContent=msg;}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}

render();
</script>
</body>
</html>
